name: Release

# Publishes a notarized .dmg to a GitHub Release whenever you push a version tag.
#   git tag v1.0 && git push origin v1.0
#
# Secrets — REUSED from the Surrah repo (same Apple account, same values):
#   ASC_KEY_ID            App Store Connect API key ID
#   ASC_ISSUER_ID         App Store Connect API issuer UUID
#   ASC_API_KEY_P8        base64 of the App Store Connect API .p8
#
# Secrets — NEW for Mudlej (Surrah's iOS *Distribution* cert can't sign a macOS
# .dmg; notarized macOS distribution needs a "Developer ID Application" cert):
#   DEVELOPER_ID_CERT_P12_BASE64   base64 of your Developer ID Application cert (.p12)
#                                  ->  base64 -i DeveloperID.p12 | pbcopy
#   DEVELOPER_ID_CERT_PASSWORD     the password set when exporting that .p12
#   APPLE_TEAM_ID                  10-char team id of the Developer ID cert (e.g. JA8SVE4GX4)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required for `gh release create`

jobs:
  release:
    runs-on: macos-latest
    env:
      APP_NAME: Mudlej
      SCHEME: Mudlej
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

      - name: Build & sign (Release, Developer ID, hardened runtime)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild -project "$APP_NAME.xcodeproj" -scheme "$SCHEME" \
            -configuration Release -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            ENABLE_DEBUG_DYLIB=NO \
            clean build
          # get-task-allow (a debug entitlement) is rejected by notarization — make sure it's gone.
          codesign -d --entitlements - \
            "build/Build/Products/Release/$APP_NAME.app" 2>/dev/null \
            | grep -q "get-task-allow" && { echo "::error::get-task-allow present"; exit 1; } || true
          # Fail early unless the bundle is Developer-ID signed with hardened runtime.
          codesign --verify --deep --strict --verbose=2 \
            "build/Build/Products/Release/$APP_NAME.app"

      - name: Package .dmg
        run: |
          set -euo pipefail
          mkdir -p dmg
          cp -R "build/Build/Products/Release/$APP_NAME.app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "$APP_NAME" -srcfolder dmg \
            -ov -format UDZO "$APP_NAME.dmg"

      - name: Notarize & staple
        run: |
          set -euo pipefail
          KEY="$RUNNER_TEMP/AuthKey.p8"
          echo "${{ secrets.ASC_API_KEY_P8 }}" | base64 --decode > "$KEY"
          xcrun notarytool submit "$APP_NAME.dmg" \
            --key "$KEY" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" --wait
          xcrun stapler staple "$APP_NAME.dmg"
          rm "$KEY"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" "$APP_NAME.dmg" \
            --title "$APP_NAME ${GITHUB_REF_NAME}" \
            --generate-notes
